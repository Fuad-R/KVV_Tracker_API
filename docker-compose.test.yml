# docker-compose.test.yml
# Test environment: PostgreSQL + Transit Tracker API service.
#
# Usage:
#   docker-compose -f docker-compose.test.yml up --build -d
#   pytest tests/api/
#   docker-compose -f docker-compose.test.yml down -v

services:
  test-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./tests/db_init.sql:/docker-entrypoint-initdb.d/01_schema.sql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH: "false"
    volumes:
      - ./tests/db_connection_test.txt:/config/db_connection.txt
    depends_on:
      test-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 15
