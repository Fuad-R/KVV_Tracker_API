services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: kvv_test
      POSTGRES_USER: kvv
      POSTGRES_PASSWORD: kvv
    volumes:
      - ./tests/api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvv -d kvv_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-provider:
    image: python:3.12-slim
    working_dir: /app
    command: ["python", "tests/api/mock_provider_server.py"]
    volumes:
      - ./:/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    environment:
      AUTH: "true"
      PROVIDER_SEARCH_URL: "http://mock-provider:18080/sl3-alone/XSLT_STOPFINDER_REQUEST"
      PROVIDER_DM_URL: "http://mock-provider:18080/sl3-alone/XSLT_DM_REQUEST"
      NOTIFICATION_API_PROVIDERS: "http://mock-provider:18080/nvbw/,http://mock-provider:18080/standard/"
    ports:
      - "8080:8080"
    volumes:
      - ./tests/api/db/db_connection.txt:/config/db_connection.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
      mock-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20
