name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Job 1: Build the project and run C++ unit tests
  # ------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential git \
            libcurl4-openssl-dev libpq-dev libssl-dev

      - name: Build main project
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Build and run C++ unit tests
        run: |
          cd tests/cpp
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ctest --output-on-failure

  # ------------------------------------------------------------------
  # Job 2: Build the Docker image and run API integration tests
  # ------------------------------------------------------------------
  api-tests:
    runs-on: ubuntu-22.04
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test environment
        run: |
          docker compose -f docker-compose.test.yml up --build -d
          # Wait for the API to become healthy
          echo "Waiting for API health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is healthy!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 5
          done
          # Final check
          curl -sf http://localhost:8080/health || (echo "API failed to start"; docker compose -f docker-compose.test.yml logs; exit 1)

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r tests/api/requirements.txt

      - name: Run API tests
        env:
          API_BASE_URL: http://localhost:8080
          AUTH: "false"
        run: |
          pytest tests/api/ -v --tb=short

      - name: Print service logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs

      - name: Tear down test environment
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
