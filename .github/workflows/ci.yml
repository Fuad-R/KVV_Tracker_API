name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libpq-dev libssl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Configure and build
        run: |
          cmake -S . -B build
          cmake --build build -j$(nproc)

      - name: Run C++ unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Start Docker test environment
        run: docker compose -f docker-compose.test.yml up --build -d

      - name: Wait for API healthcheck
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.test.yml logs api
          exit 1

      - name: Run API tests
        run: pytest -v tests/api/

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down Docker test environment
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
